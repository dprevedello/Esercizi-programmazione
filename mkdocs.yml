site_name: Esercizi di Programmazione
site_description: >
  Raccolta didattica di esercizi di programmazione per studenti
  di scuola secondaria di secondo grado.
site_author: Esercizi di Programmazione
site_url: https://dprevedello.github.io/Esercizi-programmazione/

repo_name: Esercizi-programmazione
repo_url: https://github.com/dprevedello/Esercizi-programmazione
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  language: it
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Passa alla modalità scura
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Passa alla modalità chiara
  font:
    text: Roboto
    code: Roboto Mono
  icon:
    repo: fontawesome/brands/github
    logo: material/code-braces
  features:
    - navigation.tabs           # tab superiori per sezione
    - navigation.tabs.sticky    # tab sempre visibili durante lo scroll
    - navigation.sections       # raggruppa voci nel menu laterale
    - navigation.expand         # espande automaticamente le sezioni
    - navigation.top            # pulsante "torna su"
    - navigation.indexes        # index.md come pagina della sezione
    - search.highlight          # evidenzia i risultati nella pagina
    - search.suggest            # completamento automatico nella ricerca
    - content.code.copy         # pulsante copia nei blocchi di codice
    - content.code.annotate     # annotazioni nei blocchi di codice
    - content.tabs.link         # sincronizza i tab tra le pagine
    - toc.follow                # segue la posizione nel sommario laterale

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/dprevedello/Esercizi-programmazione
      name: Repository su GitHub

copyright: >
  &copy; 2025 Esercizi di Programmazione &mdash;
  Materiale didattico per la scuola secondaria

extra_css:
  - stylesheets/extra.css

plugins:
  - search:
      lang: it
      separator: '[\s\-\.]+'
  - minify:
      minify_html: true

markdown_extensions:
  # Blocchi di ammonimento (note, warning, tip…)
  - admonition
  - pymdownx.details
  # Blocchi di codice con evidenziazione
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.snippets:
      base_path: .
      check_paths: true
  # Tab per linguaggio / sistema operativo
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
  # Emoji Material
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  # Altro
  - pymdownx.keys          # tasti da tastiera (es. ++ctrl+c++)
  - pymdownx.mark          # ==testo evidenziato==
  - pymdownx.tilde         # ~~barrato~~
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      title: In questa pagina
  - pymdownx.arithmatex:
      generic: true

# ──────────────────────────────────────────────
# Navigazione
# ──────────────────────────────────────────────
