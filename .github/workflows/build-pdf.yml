name: Build Wiki PDF

on:
  push:
    branches: [main]
  workflow_dispatch:  # permette l'esecuzione manuale

jobs:
  build-pdf:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout del repository
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # necessario per il plugin git-revision-date

      - name: Install WeasyPrint system dependencies  # <-- questo mancava
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libpango-1.0-0 \
            libpangoft2-1.0-0 \
            libpangocairo-1.0-0 \
            libcairo2 \
            libgdk-pixbuf2.0-0 \
            libffi-dev \
            shared-mime-info \
            fonts-liberation

      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # 3. Installazione dipendenze
      - name: Installa dipendenze
        run: pip install -r requirements.txt

      - name: Build site with PDF
        run: mkdocs build

      - name: Upload PDF as artifact
        uses: actions/upload-artifact@v4
        with:
          name: wiki-pdf
          path: site/*.pdf